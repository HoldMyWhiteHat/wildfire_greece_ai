<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fire Risk Explorer – Greece</title>
  <style>
    body {
      margin: 0;
      background: #0e1117;
      color: #e6edf3;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #161b22;
      padding: 40px;
      border-radius: 10px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.85;
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #238636;
      border: none;
      color: white;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.secondary {
      background: #30363d;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🔥 Fire Risk Explorer</h1>
  <p>
    Visual exploration of wildfire risk maps for Greece.
    Choose how you want to explore the data.
  </p>

  <button onclick="location.href='/ui/browse.html'">
    Explore all maps
  </button>

  <button class="secondary" onclick="location.href='/ui/compare.html'">
    Compare two dates
  </button>
</div>

</body>
</html>
